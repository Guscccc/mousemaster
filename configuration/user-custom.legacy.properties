# mousemaster will automatically convert the key aliases to your current keyboard layout.
# However, if you want to make a change to the key aliases, and your keyboard layout
# is not us-qwerty, then remove .us-qwerty
forced-active-keyboard-layout=us-qwerty
key-alias.enablemod.us-qwerty=leftalt rightalt
key-alias.enablekey.us-qwerty=e capslock
key-alias.exit.us-qwerty=q i
key-alias.clickthendisable.us-qwerty=,
key-alias.up.us-qwerty=w
key-alias.down.us-qwerty=s
key-alias.left.us-qwerty=a
key-alias.right.us-qwerty=d
key-alias.jump.us-qwerty='
key-alias.wheelup.us-qwerty=.
key-alias.wheeldown.us-qwerty=m
key-alias.wheelleft.us-qwerty=u
key-alias.wheelright.us-qwerty=o
key-alias.leftbutton.us-qwerty=j
key-alias.middlebutton.us-qwerty=k
key-alias.rightbutton.us-qwerty=l
key-alias.toggleleft.us-qwerty=n
key-alias.fast.us-qwerty=tab p v b
key-alias.slow.us-qwerty=capslock ;
key-alias.superslow.us-qwerty=leftshift rightshift /
key-alias.grid.us-qwerty=g
key-alias.windowmod.us-qwerty=leftshift rightshift
key-alias.hint.us-qwerty=f
key-alias.hint2mod.us-qwerty=leftshift rightshift
key-alias.uihintmod.us-qwerty=leftalt rightalt
key-alias.screenselection.us-qwerty=c
key-alias.navigateback.us-qwerty=h
key-alias.navigateforward.us-qwerty=y
key-alias.hint1key.us-qwerty=1 2 3 4 5 6 7 8 9 0 - = tab q w e r t y u i o p [ ] backslash a s d f g h j k l ; ' z x c v b n m , . / space
key-alias.hint2key.us-qwerty=1 2 3 4 5 6 7 8 9 0 - = tab q w e r t y u i o p [ ] backslash a s d f g h j k l ; ' z x c v b n m , . / space
key-alias.extendedhint1key.us-qwerty=1 2 3 4 5 6 7 8 9 0 - = tab q w e r t y u i o p [ ] backslash a s d f g h j k l ; ' z x c v b n m , . / space
key-alias.extendedhint2key.us-qwerty=1 2 3 4 5 6 7 8 9 0 - = tab q w e r t y u i o p [ ] backslash a s d f g h j k l ; ' z x c v b n m , . / space
key-alias.hintscreenselectionkey.us-qwerty=j k l ; a s d f g
key-alias.arrowmod.us-qwerty=leftalt rightalt
key-alias.arrowkey.us-qwerty=i k j l
key-alias.ctrl=leftctrl rightctrl

idle-mode.push-mode-to-history-stack=true
normal-mode.push-mode-to-history-stack=true

# Press e while holding alt to activate, or press capslock while holding alt.
idle-mode.to.normal-mode=+enablemod +enablekey | _{enablemod} +enablekey

normal-mode.indicator.enabled=true
normal-mode.indicator.idle.color=#FF0000
normal-mode.indicator.move.color=#FF0000
normal-mode.indicator.wheel.color=#FFFF00
normal-mode.indicator.mouse-press.color=#00FF00
# The following keys can be used to go back to idle mode:
# exit keys (q or i), click-then-disable key (,), alt + e, alt + capslock, f2, f3.
normal-mode.to.idle-mode=^{arrowmod ctrl} +exit | ^{ctrl} -clickthendisable | +enablemod +enablekey | _{enablemod} +enablekey \
  | #f2 | #f3
normal-mode.break-combo-preparation=+enablemod +enablekey | _{enablemod} +enablekey
normal-mode.mouse.initial-velocity=350 | _{slow} ^{superslow} -> 110 | _{fast} -> 1400 | _{superslow} -> 35
normal-mode.mouse.max-velocity=2200 | _{slow} ^{superslow} -> 350 | _{fast} -> 4500 | _{superslow} -> 75
normal-mode.mouse.acceleration=2600 | _{slow} ^{superslow} -> 500 | _{fast} -> 5000 | _{superslow} -> 120
normal-mode.mouse.acceleration-easing=smootherstep
normal-mode.wheel.initial-velocity=650 | _{slow} ^{superslow} -> 80 | _{fast} -> 6000 | _{superslow} -> 20
normal-mode.wheel.max-velocity=2200 | _{slow} ^{superslow} -> 200 | _{fast} -> 22000 | _{superslow} -> 50
normal-mode.wheel.acceleration=1200 | _{slow} ^{superslow} -> 250 | _{fast} -> 30000 | _{superslow} -> 80
normal-mode.wheel.acceleration-easing=smootherstep
# Start moving with direction keys.
# When releasing the jump key, if direction keys are already pressed then start moving.
normal-mode.start-move.up=^{arrowmod ctrl} +up | ^{ctrl} _{up} -jump
normal-mode.start-move.down=^{arrowmod ctrl} +down | ^{ctrl} _{down} -jump
normal-mode.start-move.left=^{arrowmod ctrl} +left | ^{ctrl} _{left} -jump
normal-mode.start-move.right=^{arrowmod ctrl} +right | ^{ctrl} _{right} -jump
# Stop moving by releasing direction keys.
# If the jump/grid/hint/screenselection key is pressed, then stop moving.
normal-mode.stop-move.up=-up | +jump | +grid | +hint | +screenselection
normal-mode.stop-move.down=-down | +jump | +grid | +hint | +screenselection
normal-mode.stop-move.left=-left | +jump | +grid | +hint | +screenselection
normal-mode.stop-move.right=-right | +jump | +grid | +hint | +screenselection
# Register ctrl to allow ctrl-clicking.
normal-mode.press.left=^{arrowmod} _{none | ctrl} +leftbutton | _{none} +clickthendisable
normal-mode.press.middle=^{arrowmod ctrl} +middlebutton
normal-mode.press.right=^{arrowmod} _{none | ctrl} +rightbutton
normal-mode.release.left=^{arrowmod} -leftbutton
normal-mode.release.middle=^{arrowmod} -middlebutton
normal-mode.release.right=^{arrowmod} -rightbutton
normal-mode.toggle.left=^{arrowmod} _{none | ctrl} +toggleleft
normal-mode.start-wheel.up=^{ctrl} +wheelup
normal-mode.start-wheel.down=^{ctrl} +wheeldown
normal-mode.start-wheel.left=^{ctrl} +wheelleft
normal-mode.start-wheel.right=^{ctrl} +wheelright
normal-mode.stop-wheel.up=-wheelup
normal-mode.stop-wheel.down=-wheeldown
normal-mode.stop-wheel.left=-wheelleft
normal-mode.stop-wheel.right=-wheelright

# Eat the fast and superslow key presses to prevent them from reaching apps.
# Do not eat fast while Alt or Win is held so Alt-Tab and Win shortcuts can reach Windows.
# Eat slow key presses to prevent them from reaching apps.
normal-mode.noop.eatspeedmods=^{ctrl} +slow | ^{leftalt rightalt leftwin rightwin ctrl} +fast | ^{ctrl} +superslow

normal-mode.to.jump-mode=^{ctrl} +jump
jump-mode.noop.eatspeedmods=+slow | +fast | +superslow
jump-mode.to.normal-mode=-jump
jump-mode.indicator=normal-mode.indicator
jump-mode.mouse=normal-mode.mouse
jump-mode.stop-move=normal-mode.stop-move
# Invisible grid that is centered around the mouse and has a width and height equal to
# half the screen's width and height.
jump-mode.grid.area=active-screen
jump-mode.grid.area-width-percent=0.5
jump-mode.grid.area-height-percent=0.5
jump-mode.grid.synchronization=grid-center-follows-mouse
# Change line-visible to true to see the edge lines.
jump-mode.grid.line-visible=false
# Jump with direction keys, or by pressing the jump key (if direction keys are already pressed).
jump-mode.snap.up=+up | _{up} +jump
jump-mode.snap.down=+down | _{down} +jump
jump-mode.snap.left=+left | _{left} +jump
jump-mode.snap.right=+right | _{right} +jump

# Grid is enabled with g, disabled with g or esc.
# Press direction keys to shrink the grid in one direction.
normal-mode.to.grid-mode=^{windowmod ctrl} +grid
grid-mode.to.normal-mode=+grid | +esc
grid-mode.to.idle-mode=+exit
grid-mode.indicator=normal-mode.indicator
grid-mode.grid.area=active-screen
grid-mode.grid.area-width-percent=0.99
grid-mode.grid.area-height-percent=0.99
grid-mode.grid.synchronization=mouse-follows-grid-center
grid-mode.grid.line-visible=true
grid-mode.grid.line-color=#FF0000
grid-mode.shrink-grid.up=+up
grid-mode.shrink-grid.down=+down
grid-mode.shrink-grid.left=+left
grid-mode.shrink-grid.right=+right

# Window mode is enabled by holding windowmod and pressing the grid key (g).
# It is exited as soon as windowmod is released.
# Move to the active window's edges with direction keys.
# Move to the active window's center with the grid key (g).
normal-mode.noop.eatwindowmod=+windowmod
normal-mode.to.window-mode=^{ctrl} _{windowmod} +grid
window-mode.to.normal-mode=-windowmod
window-mode.indicator=normal-mode.indicator
window-mode.grid.area=active-window
# Top inset to be able to quickly access a window's title bar (and potentially grab it and move the window).
window-mode.grid.area-top-inset=15
window-mode.grid.synchronization=mouse-follows-grid-center
window-mode.grid.row-count=1
window-mode.grid.column-count=1
window-mode.grid.line-visible=true
window-mode.grid.line-color=#FF0000
window-mode.snap.up=+up
window-mode.snap.down=+down
window-mode.snap.left=+left
window-mode.snap.right=+right
window-mode.move-to-grid-center=+grid

# Hints are enabled with f, disabled with f or esc.
# Holding shift while selecting the hint will trigger a second hint pass with a smaller hint grid
# centered around the mouse to refine the position.
normal-mode.to.hint1-mode=^{uihintmod ctrl} +hint
# Go back to normal-mode when esc, backspace, or the last letter of the hint is pressed.
hint1-mode.to.normal-mode=+esc | +backspace | ^{hint2mod} +extendedhint1key
# Prevent final hint key press from executing commands in next mode (e.g. n -> toggle left click)
hint1-mode.break-combo-preparation=+extendedhint1key
hint1-mode.hide-cursor.enabled=true
hint1-mode.hint.type=grid
hint1-mode.hint.grid-area=active-screen
hint1-mode.hint.active-screen-grid-area-center=screen-center
hint1-mode.hint.grid-cell-width=35.5
hint1-mode.hint.grid-cell-height=22.2
hint1-mode.hint.layout-row-count=8
hint1-mode.hint.layout-column-count=6
hint1-mode.hint.selection-keys=hint1key
hint1-mode.hint.select=_{none | hint2mod} +extendedhint1key
hint1-mode.hint.font-size=10
hint1-mode.hint.font-name=JetBrains Mono NL
hint1-mode.hint.font-color=#FFFFFF
hint1-mode.hint.font-weight=bold
hint1-mode.hint.font-spacing-percent=0.15
hint1-mode.hint.font-outline-thickness=3
hint1-mode.hint.font-outline-color=#000000
hint1-mode.hint.font-outline-opacity=1
hint1-mode.hint.font-shadow-blur-radius=8
hint1-mode.hint.font-shadow-color=#000000
hint1-mode.hint.font-shadow-opacity=0
hint1-mode.hint.font-shadow-stack-count=1
hint1-mode.hint.font-shadow-horizontal-offset=0
hint1-mode.hint.font-shadow-vertical-offset=0
hint1-mode.hint.box-color=#ffffff | _{hint2mod} -> #ffffff
hint1-mode.hint.box-opacity=0
hint1-mode.hint.prefix-box-enabled=true
hint1-mode.hint.prefix-in-background=false
hint1-mode.hint.prefix-font-name=JetBrains Mono NL
hint1-mode.hint.prefix-font-size=10
hint1-mode.hint.prefix-font-weight=bold
hint1-mode.hint.prefix-font-spacing-percent=0.15
hint1-mode.hint.prefix-font-color=#FFF2A8
hint1-mode.hint.prefix-selected-font-color=#CCCCCC
hint1-mode.hint.prefix-font-opacity=1
hint1-mode.hint.prefix-font-outline-thickness=3
hint1-mode.hint.prefix-font-outline-color=#000000
hint1-mode.hint.prefix-font-outline-opacity=1
hint1-mode.hint.prefix-font-shadow-blur-radius=8
hint1-mode.hint.prefix-font-shadow-color=#000000
hint1-mode.hint.prefix-font-shadow-opacity=0
hint1-mode.hint.prefix-font-shadow-stack-count=1
hint1-mode.hint.prefix-font-shadow-horizontal-offset=0
hint1-mode.hint.prefix-font-shadow-vertical-offset=0
hint1-mode.hint.selected-font-opacity=0.5
# Hint configuration for a 4K screen:
hint1-mode.hint.grid-cell-width.3840x2160=96
hint1-mode.hint.grid-cell-height.3840x2160=54
hint1-mode.hint.layout-row-count.3840x2160=4
hint1-mode.hint.layout-column-count.3840x2160=11
hint1-mode.hint.selection-keys.3840x2160=extendedhint1key
# Hint configuration for a QHD screen:
hint1-mode.hint.grid-cell-width.2560x1440=64
hint1-mode.hint.grid-cell-height.2560x1440=36
hint1-mode.hint.layout-row-count.2560x1440=4
hint1-mode.hint.layout-column-count.2560x1440=11
hint1-mode.hint.selection-keys.2560x1440=extendedhint1key
# Hint configuration for a UWQHD screen:
hint1-mode.hint.grid-cell-width.3440x1440=86
hint1-mode.hint.grid-cell-height.3440x1440=36
hint1-mode.hint.layout-row-count.3440x1440=4
hint1-mode.hint.layout-column-count.3440x1440=11
hint1-mode.hint.selection-keys.3440x1440=extendedhint1key
hint1-mode.hint.undo=+backspace

# Switch to hint2-mode (showing the second hint grid) when the last letter of the hint
# is pressed while holding hint2mod.
hint1-mode.noop.eathintmod=+hint2mod
hint1-mode.noop.eatenter=+enter
hint1-mode.to.hint2-mode=_{hint2mod} +extendedhint1key
hint2-mode.hide-cursor=hint1-mode.hide-cursor
hint2-mode.to.idle-mode=+exit
hint2-mode.to.hint1-mode=_{none | hint2mod} +backspace
hint2-mode.to.normal-mode=+esc | _{none | hint2mod} +extendedhint1key
hint2-mode.break-combo-preparation=_{none | hint2mod} +extendedhint1key
hint2-mode.noop.eatenter=+enter
hint2-mode.hint=hint1-mode.hint
hint2-mode.hint.type=grid
hint2-mode.hint.grid-area=active-screen
hint2-mode.hint.active-screen-grid-area-center=last-selected-hint
hint2-mode.hint.grid-max-row-count=4
hint2-mode.hint.grid-max-column-count=11
hint2-mode.hint.grid-cell-width=50
hint2-mode.hint.grid-cell-height=75
hint2-mode.hint.select=+extendedhint2key
hint2-mode.hint.selection-keys=hint2key
hint2-mode.hint.font-size=8
hint2-mode.hint.font-color=#FFFFFF
hint2-mode.hint.font-weight=bold
hint2-mode.hint.font-outline-thickness=3
hint2-mode.hint.font-outline-color=#000000
hint2-mode.hint.font-outline-opacity=1
hint2-mode.hint.font-shadow-blur-radius=8
hint2-mode.hint.font-shadow-color=#000000
hint2-mode.hint.font-shadow-opacity=0
hint2-mode.hint.font-shadow-stack-count=1
hint2-mode.hint.font-shadow-horizontal-offset=0
hint2-mode.hint.font-shadow-vertical-offset=0
hint2-mode.hint.box-color=#ffffff
hint2-mode.hint.box-opacity=0
hint2-mode.hint.prefix-in-background=false
hint2-mode.hint.prefix-box-enabled=false
# Hint configuration for a 4K screen:
hint2-mode.hint.grid-max-row-count.3840x2160=4
hint2-mode.hint.grid-max-column-count.3840x2160=11
hint2-mode.hint.grid-cell-width.3840x2160=48
hint2-mode.hint.grid-cell-height.3840x2160=67.5
hint2-mode.hint.selection-keys.3840x2160=extendedhint2key
# Hint configuration for a QHD screen:
hint2-mode.hint.grid-max-row-count.2560x1440=4
hint2-mode.hint.grid-max-column-count.2560x1440=11
hint2-mode.hint.grid-cell-width.2560x1440=32
hint2-mode.hint.grid-cell-height.2560x1440=45
hint2-mode.hint.selection-keys.2560x1440=extendedhint2key
# Hint configuration for a UWQHD screen:
hint2-mode.hint.grid-max-row-count.3440x1440=4
hint2-mode.hint.grid-max-column-count.3440x1440=11
hint2-mode.hint.grid-cell-width.3440x1440=43
hint2-mode.hint.grid-cell-height.3440x1440=45
hint2-mode.hint.selection-keys.3440x1440=extendedhint2key
hint2-mode.zoom.percent=5.0
hint2-mode.zoom.center=last-selected-hint

# Screen selection is enabled with c, disabled with c or esc.
normal-mode.to.screen-selection-mode=^{ctrl} +screenselection
screen-selection-mode.to.normal-mode=+screenselection | +esc | +backspace | +hintscreenselectionkey
screen-selection-mode.break-combo-preparation=+hintscreenselectionkey
screen-selection-mode.to.idle-mode=+exit
screen-selection-mode.hint.type=grid
screen-selection-mode.hint.grid-area=all-screens
screen-selection-mode.hint.grid-max-row-count=1
screen-selection-mode.hint.grid-max-column-count=1
screen-selection-mode.hint.selection-keys=hintscreenselectionkey
screen-selection-mode.hint.font-size=120

# UI hints are enabled by pressing f while holding uihintmod.
normal-mode.to.ui-hint-mode=^{ctrl} +uihintmod +hint | ^{ctrl} _{uihintmod} +hint
ui-hint-mode.to.normal-mode=+esc | +backspace | +hint1key
ui-hint-mode.break-combo-preparation=+hint1key
ui-hint-mode.indicator=normal-mode.indicator
ui-hint-mode.noop.eatenter=+enter
ui-hint-mode.hint.type=ui
ui-hint-mode.hint.selection-keys=hint1key
ui-hint-mode.hint.select=+hint1key
ui-hint-mode.hint.undo=+backspace
ui-hint-mode.hint.font-size=10
ui-hint-mode.hint.font-weight=bold
ui-hint-mode.hint.font-color=#FFFFFF
ui-hint-mode.hint.selected-font-color=#CCCCCC
ui-hint-mode.hint.font-shadow-opacity=0
ui-hint-mode.hint.box-color=#204E8A
ui-hint-mode.hint.box-opacity=1
ui-hint-mode.hint.cell-horizontal-padding=8
ui-hint-mode.hint.cell-vertical-padding=0
ui-hint-mode.hint.box-border-opacity=1
ui-hint-mode.hint.box-border-radius=3
ui-hint-mode.hint.background-opacity=0.2

# Remappings.
normal-mode.macro.copy=_{ctrl} +screenselection -> +screenselection -screenselection
normal-mode.macro.navigateback=^{ctrl} +navigateback -> +leftalt +leftarrow -leftarrow -leftalt
normal-mode.macro.navigateforward=^{ctrl} +navigateforward -> +leftalt +rightarrow -rightarrow -leftalt
normal-mode.macro.taskmanager=_{ctrl windowmod} +esc -> +leftctrl +leftshift +esc -esc -leftshift -leftctrl

idle-mode.macro=_arrowremapping-mode.macro
normal-mode.macro=_arrowremapping-mode.macro
key-alias.arrowextramod=leftshift rightshift ctrl leftwin
_arrowremapping-mode.macro.pressarrow=\
  +arrowmod {#*arrowextramod?} +arrowkey | _{arrowmod | arrowmod arrowextramod} +arrowkey \
  -> arrowkey=uparrow downarrow leftarrow rightarrow \
  -> -arrowmod +arrowkey
_arrowremapping-mode.macro.releasearrow=_{arrowmod} -arrowkey \
  -> arrowkey=uparrow downarrow leftarrow rightarrow \
  -> -arrowkey
_arrowremapping-mode.macro.releaseallarrows=_{arrowkey} -arrowmod -> -uparrow -leftarrow -downarrow -rightarrow
key-alias.arrowhandledkey=arrowkey arrowextramod enablekey hint tab
_arrowremapping-mode.macro.repressalt=_{arrowmod} ^{arrowkey} #!arrowhandledkey -> +arrowmod

idle-mode.to.begin-alt-tab-mode=_{leftalt | rightalt} #tab
normal-mode.to.begin-alt-tab-mode=_{leftalt | rightalt} #tab
# The Alt Tab menu process name is Explorer.EXE.
# We want to center the mouse on the active window as soon as the Alt Tab menu is not
# the active window anymore.
# 1. Wait for the release of alt.
begin-alt-tab-mode.to.end-alt-tab-mode=-leftalt | -rightalt
# 2.a Wait for Explorer.EXE to lose focus.
end-alt-tab-mode.to.center-on-active-window-mode=^{Explorer.EXE}
# 2.b Fallback: if Explorer.EXE is still active 200ms after alt release, go back.
end-alt-tab-mode.to.previous-mode-from-history-stack=#{*}-2000
# 3. Center the mouse on the (newly) active window, then switch back.
center-on-active-window-mode.grid.area=active-window
center-on-active-window-mode.grid.synchronization=mouse-follows-grid-center
# Immediately switch back to previous mode after centering the mouse.
center-on-active-window-mode.to.previous-mode-from-history-stack=wait-0
